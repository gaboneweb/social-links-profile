<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/style.css">
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="flex">
  <main class="container flex-item">
      <article class="card flex">
         <img class="profile-pic" src="./assets/images/avatar-jessica.jpeg" alt="Profile Picture">
         <section class="name-location flex flex-item">
            <p class="name text-preset-1 flex-item">Jessica Randall</p>
            <p class="location text-preset-2 bold flex-item">London, United Kingdom</p>
         </section>
         <p class="bio text-preset-2">"Front-end developer and avid reader"</p>
         <section class="links flex flex-item">
            <button class="link bold text-preset-2 flex-item">GitHub</button>
            <button class="link bold text-preset-2 flex-item">Frontend Mentor</button>
            <button class="link bold text-preset-2 flex-item">LinkedIn</button>
            <button class="link bold text-preset-2 flex-item">Twitter</button>
            <button class="link bold text-preset-2 flex-item">Instagram</button>
         </section>
      </article>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Bulelani Gabonewe</a>.
  </footer>
</body>
</html>
